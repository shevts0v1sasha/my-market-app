<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Order</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="page">
    <header class="header">
        <h2 class="brand" th:text="${'Заказ #' + order.id()}"></h2>
        <nav class="nav">
            <a th:href="@{/items}">Витрина</a>
            <a th:href="@{/cart/items}">Корзина</a>
            <a th:href="@{/orders}">Заказы</a>
        </nav>
    </header>

    <p class="success" th:if="${newOrder}">Заказ успешно оформлен</p>

    <div class="list">
        <div class="card list-card" th:each="item : ${order.items()}">
            <p class="item-title" th:text="${item.title()}"></p>
            <p th:text="${item.price() + ' руб. x ' + item.count()}"></p>
            <p th:text="${'Сумма: ' + (item.price() * item.count()) + ' руб.'}"></p>
        </div>
    </div>

    <h3 class="total" th:text="${'Итого: ' + order.totalSum() + ' руб.'}"></h3>
</div>
</body>
</html>
